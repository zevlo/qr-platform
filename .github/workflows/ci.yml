name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r api/requirements-dev.txt
      - run: ruff check api/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front-end-nextjs/package-lock.json
      - working-directory: front-end-nextjs
        run: |
          npm ci
          npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - working-directory: api
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          pytest -v

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        service: [api, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - id: meta
        run: |
          echo "image=qr-${{ matrix.service }}" >> $GITHUB_OUTPUT
          echo "context=${{ matrix.service == 'api' && 'api' || 'front-end-nextjs' }}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: ${{ steps.meta.outputs.context }}
          load: true
          tags: ${{ steps.meta.outputs.image }}:${{ github.sha }}
          build-args: |
            ${{ matrix.service == 'frontend' && 'NEXT_PUBLIC_API_URL=http://localhost:8000' || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.image }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: sarif
          output: trivy-${{ matrix.service }}.sarif

      - if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      - if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - if: github.ref == 'refs/heads/main'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - if: github.ref == 'refs/heads/main'
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE: ${{ steps.meta.outputs.image }}
          SHA: ${{ github.sha }}
        run: |
          docker tag $IMAGE:$SHA $REGISTRY/$IMAGE:$SHA
          docker tag $IMAGE:$SHA $REGISTRY/$IMAGE:latest
          docker push --all-tags $REGISTRY/$IMAGE
